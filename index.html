<!doctype html>
<html lang="en">
  <head>
    <!-- ══ BASIC META ══ -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    
    <!-- ══ TITLE & SEO ══ -->
    <title>LPU Town — Connect. Share. Grow.</title>
    <meta name="description" content=" LPU Town is a campus social platform to connect, share reels, and grow your network within the LPU community." />
    <meta name="keywords" content="LPU, social app, students, reels, networking" />
    <meta name="author" content="LPU Town Team" />

    <!-- ══ FAVICON ══ -->
    <link rel="icon" href="/vite.jpeg" type="image/jpeg" />
    <link rel="apple-touch-icon" href="/vite.jpeg" />

    <!-- ══ THEME COLOR (Mobile UI) ══ -->
    <meta name="theme-color" content="#6366f1" />

    <!-- ══ OPEN GRAPH (SHARING) ══ -->
    <meta property="og:title" content="LPU Town" />
    <meta property="og: description" content=" Connect with the LPU community, showcase talent, and grow your network." />
    <meta property="og:image" content="/vite.jpeg" />
    <meta property="og:type" content="website" />

    <!-- ══ PERFORMANCE ══ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- ══ FONTS (OPTIONAL BUT BETTER UI) ══ -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  </head>

  <body>
    <!-- ══ ROOT APP ══ -->
    <div id="root"></div>

    <!-- ══ NO-JS FALLBACK ══ -->
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>

    <!-- ══ MAIN SCRIPT ══ -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
